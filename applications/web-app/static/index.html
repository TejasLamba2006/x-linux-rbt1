<!-- applications/web-app/static/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>X-LINUX-RBT1 Controller</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/script.js" defer></script>
</head>

<body>
    <!-- Orientation Lock Overlay -->
    <div id="orientation-lock">
        <svg viewBox="0 0 24 24">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5v14z"/>
        </svg>
        <p>Please rotate your device to landscape mode</p>
    </div>

    <button id="fullscreen-button" class="fullscreen-button">
        &#x26F6;
    </button>
    <div id="container">
        <!-- Left Joystick -->
        <div id="left-joystick" class="joystick">
            <div class="dial-container">
                <!-- Dummy Outer Dial -->
                <div class="outer-dial">
                    <div class="c5 dummy"></div>
                </div>
                <!-- Inner Joystick -->
                <div class="joystick-inner">
                    <div class="outer-circle c4">
                        <div class="circle c3">
                            <div class="arrows vertical-arrows"></div>
                            <div class="circle c2">
                                <div class="circle c1"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mode Selector -->
        <div id="mode-selector">
            <!-- Drive Type Indicator -->
            <div id="drive-type-indicator">
                <span id="drive-type-label">Connecting...</span>
            </div>
            <!-- Voice Control -->
            <div id="voice-control">
                <button id="voice-button" title="Voice control">&#x1F3A4;</button>
                <span id="voice-status"></span>
            </div>
            <!-- Manual voice-command text input (bypasses mic, same intent classifier) -->
            <div id="voice-text-control">
                <input type="text" id="voice-text-input" placeholder="Type a command (e.g. move forward)">
                <button id="voice-text-send" title="Send as voice command">Send</button>
            </div>
            <!-- Speed Limit -->
            <div id="speed-control">
                <label for="speed-slider">Speed: <span id="speed-value">100</span>%</label>
                <input type="range" id="speed-slider" min="10" max="100" step="5" value="100">
            </div>
            <!-- Closed-loop move-by-distance, using mouse odometry -->
            <div id="move-cm-control">
                <input type="number" id="move-cm-input" min="1" max="500" step="1" placeholder="cm">
                <button id="move-cm-send" title="Drive forward this many cm">Move</button>
                <span id="move-cm-status"></span>
            </div>
            <!-- ArUco drive-to-marker vision nav -->
            <div id="vision-nav-control">
                <button id="vision-nav-btn" title="See an ArUco marker and drive up to it">Start Vision Nav</button>
                <span id="vision-nav-status"></span>
            </div>
            <!-- Always-on live camera feed with ArUco detection overlay -->
            <div id="vision-feed">
                <img id="vision-feed-img" alt="live camera feed">
            </div>
            <!-- Odometry Map Widget -->
            <div id="map-widget">
                <div id="map-widget-header">
                    <label><input type="checkbox" id="map-toggle"> Show Map</label>
                    <a id="map-fullpage-link" href="/map" target="_blank" title="Open full map">&#x2197;</a>
                </div>
                <iframe id="map-frame" title="Robot map"></iframe>
            </div>
            <div class="mode-buttons">
                <button class="mode-button" data-mode="locked" id="mode-locked">
                    <div class="button-icon"></div>
                    <div class="button-label">Locked </div>
                </button>
                <button class="mode-button" data-mode="controller" id="mode-controller">
                    <div class="button-icon"></div>
                    <div class="button-label">Controller</div>
                </button>
                <button class="mode-button" data-mode="hybrid" id="mode-hybrid">
                    <div class="button-icon"></div>
                    <div class="button-label">Hybrid</div>
                </button>
                <button class="mode-button" data-mode="follow-me" id="mode-follow-me">
                    <div class="button-icon"></div>
                    <div class="button-label">Follow-me</div>
                </button>
                <button class="mode-button" data-mode="autopilot" id="mode-autopilot">
                    <div class="button-icon"></div>
                    <div class="button-label">Autopilot</div>
                </button>
            </div>
        </div>

        <!-- Right Joystick -->
        <div id="right-joystick" class="joystick">
            <div class="dial-container">
                <!-- Outer Dial -->
                <div class="outer-dial">
                    <div class="c5">
                        <div class="dial-indicator"></div>
                    </div>
                </div>
                <!-- Inner Joystick -->
                <div class="joystick-inner">
                    <div class="outer-circle c4">
                        <div class="circle c3">
                            <div class="arrows cross-arrows"></div>
                            <div class="circle c2">
                                <div class="circle c1"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
