<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Robot Localization Map</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d0d0d;
        overflow: hidden;
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid #00ff88;
        border-radius: 8px;
        padding: 12px 18px;
        color: #00ff88;
        font-size: 14px;
        line-height: 1.8;
        pointer-events: none;
        min-width: 180px;
      }
      #hud .label {
        color: #888;
        font-size: 11px;
        text-transform: uppercase;
      }
      #hud .value {
        font-size: 18px;
        font-weight: bold;
      }
      #hud .rec {
        color: #ff4444;
        animation: blink 1s step-start infinite;
      }
      #hud .norec {
        color: #555;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      #legend {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: #555;
        font-size: 11px;
      }

      #zero-yaw-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid #00ff88;
        border-radius: 8px;
        color: #00ff88;
        font-family: inherit;
        font-size: 12px;
        padding: 8px 12px;
        cursor: pointer;
      }
      #zero-yaw-btn:active {
        background: #00ff88;
        color: #000;
      }

      #cpc-panel {
        position: fixed;
        top: 60px;
        right: 16px;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid #00ff88;
        border-radius: 8px;
        color: #00ff88;
        font-family: inherit;
        font-size: 11px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #cpc-panel input {
        width: 60px;
        background: #111;
        border: 1px solid #00ff88;
        border-radius: 4px;
        color: #00ff88;
        font-family: inherit;
        font-size: 12px;
        padding: 3px 5px;
      }
      #cpc-panel button {
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid #00ff88;
        border-radius: 4px;
        color: #00ff88;
        font-family: inherit;
        font-size: 11px;
        padding: 4px 8px;
        cursor: pointer;
      }
      #cpc-panel button:active {
        background: #00ff88;
        color: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="map"></canvas>

    <div id="hud">
      <div class="label">Yaw</div>
      <div class="value" id="h-yaw">0.0°</div>
      <div class="label">Distance</div>
      <div class="value" id="h-dist">0.0 cm</div>
      <div class="label">Position</div>
      <div class="value" id="h-pos">(0, 0)</div>
      <div class="label">Status</div>
      <div class="value norec" id="h-rec">● IDLE</div>
    </div>

    <div id="legend">
      Recording follows motor motion &nbsp;|&nbsp; Double-click mouse to reset
    </div>

    <button id="zero-yaw-btn" title="Set the phone's current heading as forward (0°)">
      Zero Heading
    </button>

    <div id="cpc-panel" title="Mouse counts per cm (see calibrate_linux.py)">
      <span>Counts/cm</span>
      <input type="number" id="cpc-input" step="0.1" min="1" />
      <button id="cpc-set-btn">Set</button>
    </div>

    <script>
      const canvas = document.getElementById("map");
      const ctx = canvas.getContext("2d");

      let W, H;
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      // ── State ──────────────────────────────────────────────────────────────────
      let robotX = 0,
        robotY = 0,
        robotYaw = 0;
      let path = [[0, 0]];
      let dist = 0;
      let recording = false;

      const cpcInput = document.getElementById("cpc-input");
      document.getElementById("cpc-set-btn").addEventListener("click", () => {
        const value = parseFloat(cpcInput.value);
        if (!value || value <= 0) return;
        wsSend({ cmd: "set_counts_per_cm", value });
      });

      const SCALE = 4; // pixels per cm

      // ── WebSocket ────────────────────────────────────────────────────────────
      let ws;
      let wsReady = false;

      function wsSend(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
      }

      function connectWs() {
        const host = location.hostname || "127.0.0.1";
        ws = new WebSocket(`ws://${host}:5001`);

        ws.onopen = () => {
          wsReady = true;
          console.log("[WS] connected");
        };

        ws.onmessage = (evt) => {
          try {
            const d = JSON.parse(evt.data);
            robotX = d.x;
            robotY = d.y;
            robotYaw = d.yaw;
            dist = d.distance;
            recording = d.recording;
            path = d.path;
            if (document.activeElement !== cpcInput && d.counts_per_cm) {
              cpcInput.value = d.counts_per_cm;
            }
          } catch (e) { /* ignore parse errors */ }
        };

        ws.onclose = () => {
          wsReady = false;
          console.log("[WS] disconnected, reconnecting in 2s...");
          setTimeout(connectWs, 2000);
        };

        ws.onerror = () => {
          ws.close();
        };
      }

      connectWs();

      document.getElementById("zero-yaw-btn").addEventListener("click", () => {
        wsSend({ cmd: "zero_yaw" });
      });

      // ── Draw ───────────────────────────────────────────────────────────────────
      function drawGrid(offsetX, offsetY) {
        const gridSize = 50 * SCALE; // 50 cm grid
        ctx.strokeStyle = "#1a1a1a";
        ctx.lineWidth = 1;

        const startX = ((offsetX % gridSize) + gridSize) % gridSize;
        const startY = ((offsetY % gridSize) + gridSize) % gridSize;

        for (let x = startX - gridSize; x < W + gridSize; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = startY - gridSize; y < H + gridSize; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }

        // Origin cross
        const ox = W / 2 + offsetX;
        const oy = H / 2 + offsetY;
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ox - 10, oy);
        ctx.lineTo(ox + 10, oy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ox, oy - 10);
        ctx.lineTo(ox, oy + 10);
        ctx.stroke();
      }

      function worldToScreen(wx, wy) {
        // Robot is always at screen center; world translates inversely
        return [
          W / 2 + (wx - robotX) * SCALE,
          H / 2 - (wy - robotY) * SCALE, // Y-axis flipped (screen Y grows down)
        ];
      }

      function drawPath() {
        if (path.length < 2) return;
        ctx.beginPath();
        const [sx, sy] = worldToScreen(path[0][0], path[0][1]);
        ctx.moveTo(sx, sy);
        for (let i = 1; i < path.length; i++) {
          const [px, py] = worldToScreen(path[i][0], path[i][1]);
          ctx.lineTo(px, py);
        }
        ctx.strokeStyle = "#00cc55";
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.stroke();

        // Start dot
        ctx.beginPath();
        ctx.arc(sx, sy, 5, 0, Math.PI * 2);
        ctx.fillStyle = "#ffaa00";
        ctx.fill();
      }

      function drawCar() {
        const cx = W / 2,
          cy = H / 2;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(((robotYaw) * Math.PI) / 180);

        // Car body
        ctx.fillStyle = "#2255ff";
        ctx.strokeStyle = "#88aaff";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(-10, -18, 20, 36, 4);
        ctx.fill();
        ctx.stroke();

        // Front arrow
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(0, -22);
        ctx.lineTo(-6, -14);
        ctx.lineTo(6, -14);
        ctx.closePath();
        ctx.fill();

        // Wheels
        ctx.fillStyle = "#aaaaaa";
        [
          [-13, -12],
          [13, -12],
          [-13, 10],
          [13, 10],
        ].forEach(([wx, wy]) => {
          ctx.fillRect(wx - 3, wy - 5, 6, 10);
        });

        ctx.restore();
      }

      function updateHUD() {
        document.getElementById("h-yaw").textContent =
          robotYaw.toFixed(1) + "°";
        document.getElementById("h-dist").textContent = dist.toFixed(1) + " cm";
        document.getElementById("h-pos").textContent =
          `(${robotX.toFixed(1)}, ${robotY.toFixed(1)})`;

        const recEl = document.getElementById("h-rec");
        if (recording) {
          recEl.textContent = "● REC";
          recEl.className = "value rec";
        } else {
          recEl.textContent = "● IDLE";
          recEl.className = "value norec";
        }
      }

      function render() {
        ctx.clearRect(0, 0, W, H);

        // Grid offset so it scrolls with the world
        const offX = (-robotX * SCALE) % (50 * SCALE);
        const offY = (robotY * SCALE) % (50 * SCALE);
        drawGrid(offX, offY);

        drawPath();
        drawCar();
        updateHUD();

        requestAnimationFrame(render);
      }

      render();
    </script>
  </body>
</html>
