<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-STM32MP-MSP01 Sensor Expansion Demo</title>
    <style>
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        body {
            background-color: black;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="center">
        <div id="visual" style="height: 600px; width: 600px;"></div>
        <div id = "accValue"></div>

        <script type="module">

            import * as THREE from "./resources/three.module.js"
            import utils from  "./resources/utils.js"
            import getAngle from "./resources/sensordata.js"
    
            let camera, scene, renderer;
            let cube;
    
            let animationInterval = 500;
            let newRotationData = [0.0, 0.0, 0.0, 0.0];
            let targetRotation = new THREE.Quaternion();
            
            let startTime = 0;
            let newDataAvailable = false;
            
            let accValField = document.getElementById("accValue");
    
            function init() {
                const visual = document.getElementById("visual");
    
                camera = new THREE.PerspectiveCamera(75, visual.clientWidth / visual.clientHeight, 1, 1000);
                camera.position.z = 400;
    
                scene = new THREE.Scene();
    
                const texture = new THREE.TextureLoader().load('resources/crate.gif');
    
                const geometry = new THREE.BoxGeometry(200, 200, 200);
                const material = new THREE.MeshBasicMaterial({ map: texture });
    
                cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
    
                renderer = new THREE.WebGLRenderer({antialias: true});
                renderer.setSize(visual.clientWidth, visual.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                visual.appendChild(renderer.domElement);
    
                window.addEventListener('resize', onWindowResize);
            }
    
            function onWindowResize() {
                //Update for child element
                const div_visual = document.getElementById('visual');
                const div_visual_height = div_visual.clientHeight;
                const div_visual_width = div_visual.clientWidth;
                camera.aspect = div_visual_width / div_visual_height;
                camera.updateProjectionMatrix();
                renderer.setSize(div_visual_width, div_visual_height);
                }
    
            function animate(timestamp) { 
                requestAnimationFrame(animate);

                if(newDataAvailable) {
    
                    targetRotation = new THREE.Quaternion(newRotationData[0], newRotationData[1], newRotationData[2], newRotationData[3]);
                    startTime = timestamp;
                    newDataAvailable = false;
                }

                let elapsed = timestamp - startTime;
                if(elapsed > animationInterval) {
                    elapsed = animationInterval;
                }
                
                let slerp_ratio = elapsed / animationInterval;

                cube.quaternion.slerp(targetRotation, slerp_ratio);
                renderer.render(scene, camera);
            }
            init();
            animate();
    
            let socket = new WebSocket("ws://{{ws_address}}:{{ws_port}}");
            socket.onopen = function (e) {
                console.log("[open] Connection established");
                //socket.send("start:" + util.getUUID());
            };
    
            socket.onmessage = function (event) {
                let srvrObj = JSON.parse(event.data);
                if(srvrObj) {
                    for(let idx = 0; idx < srvrObj.length; idx++) {
                        switch(srvrObj[idx].type) {
                            case "accelerometer":
                                const [accX, accY, accZ] = [srvrObj[idx].X, srvrObj[idx].Y, srvrObj[idx].Z];
                                break;

                            case "orientation":
                                newRotation  = [srvrObj[idx].Pitch, srvrObj[idx].Roll, srvrObj[idx].Yaw];
                                newDataAvailable = true;
                                break;
                                
                            case "quaternion":
                                newRotationData  = [srvrObj[idx].x, srvrObj[idx].y, srvrObj[idx].z, srvrObj[idx].w];
                                newDataAvailable = true;
                                break;

                            case "distance":
                                break;
                            case "color":
                                break;
                            case "cpu_info":
                                break;
                            default:break;
                        }
                    }
                    
                }
                console.log(`[message] Data received from server: ${event.data}`);
            };
    
            socket.onclose = function (event) {
                if (event.wasClean) {
                    console.log(`[close] Connection closed cleanly, code=${event.code} reason=${event.reason}`);
                } else {
                    // e.g. server process killed or network down
                    // event.code is usually 1006 in this case
                    console.log('[close] Connection died');
                }
            };
    
            socket.onerror = function (error) {
                console.log(`[error] ${error.message}`);
            };
        </script>
    </div>


</body>
</html>
